<aside class="w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col h-full overflow-y-auto">
  <!-- Brand logo -->
  <div class="h-16 flex items-center gap-3 px-6 border-b border-slate-200 dark:border-slate-800">
    <img src="/logo/logo_siscop.png" alt="Logo" class="w-8 h-8 rounded-lg object-contain" />
    <span class="text-slate-900 dark:text-white font-bold tracking-wider text-lg font-sans">SISCOP <span class="text-indigo-600 dark:text-indigo-400 font-sans">NEXT</span></span>
  </div>

  <!-- Navigation items -->
  <nav class="flex-1 py-6 px-4 space-y-2">
    @for (item of menuItems(); track item.id) {
      <div>
        @if (item.children && item.children.length > 0) {
          <!-- Parent item with children -->
          <button 
            (click)="toggleExpand(item.code)"
            class="w-full flex items-center justify-between px-4 py-3 text-sm text-slate-600 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800/50 rounded-xl transition-all cursor-pointer group"
          >
            <div class="flex items-center gap-3">
              <span class="text-slate-400 dark:text-slate-500 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">
                <i [class]="getIconClass(item) + ' text-base'"></i>
              </span>
              <span class="font-medium">{{ item.label }}</span>
            </div>
            <!-- Arrow -->
            <i 
              class="pi pi-chevron-right text-[10px] text-slate-400 dark:text-slate-500 group-hover:text-indigo-600 dark:group-hover:text-white transition-transform duration-200"
              [class.rotate-90]="expandedItems()[item.code]"
            ></i>
          </button>

          <!-- Children Submenu -->
          <div 
            class="overflow-hidden transition-all duration-300 mt-1 pl-4 space-y-1"
            [class.max-h-0]="!expandedItems()[item.code]"
            [class.max-h-96]="expandedItems()[item.code]"
          >
            @for (child of item.children; track child.id) {
              <a 
                [routerLink]="child.route"
                routerLinkActive="bg-indigo-600/10 text-indigo-600 dark:text-indigo-400 border-l-2 border-indigo-500"
                class="flex items-center gap-3 px-4 py-2.5 text-xs font-medium text-slate-600 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800/30 rounded-lg transition-all"
              >
                <i [class]="getIconClass(child) + ' text-[10px] opacity-75'"></i>
                <span>{{ child.label }}</span>
              </a>
            }
          </div>
        } @else {
          <!-- Simple parent item -->
          <a 
            [routerLink]="item.route"
            routerLinkActive="bg-indigo-600/10 text-indigo-600 dark:text-indigo-400 border-l-2 border-indigo-500"
            class="flex items-center gap-3 px-4 py-3 text-sm text-slate-600 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800/50 rounded-xl transition-all group"
          >
            <span class="text-slate-400 dark:text-slate-500 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">
              <i [class]="getIconClass(item) + ' text-base'"></i>
            </span>
            <span class="font-medium">{{ item.label }}</span>
          </a>
        }
      </div>
    }
  </nav>

  <!-- Sidebar Footer -->
  <div class="p-4 border-t border-slate-200 dark:border-slate-800 text-center text-[10px] text-slate-400 dark:text-slate-600 font-medium">
    Versión 1.0.0 &copy; 2026
  </div>
</aside>
